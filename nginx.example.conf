# Пример для VPS / Timeweb, когда nginx стоит ПЕРЕД Node.
# Без этого блока nginx отдаёт index.html на все пути, включая /api/*.

server {
    listen 80;
    server_name gamesmatch.ru www.gamesmatch.ru;

    # API → Node (порт из переменной PORT на хостинге, часто 5000 или 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Вариант A: всё остальное тоже через Node (рекомендуется)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Вариант B: только статика из dist (тогда /api ОБЯЗАТЕЛЬНО в location выше)
    # root /var/www/gamesmatch/dist;
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }
}
